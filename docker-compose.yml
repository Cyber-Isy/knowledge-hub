services:
  api:
    build:
      context: .
      dockerfile: src/KnowledgeHub.API/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/knowledgehub.db
      - Ollama__Enabled=true
      - Ollama__BaseUrl=http://host.docker.internal:11434
      - Ollama__ChatModel=llama3.1:8b
      - Ollama__EmbeddingModel=nomic-embed-text
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - api-data:/data
      - api-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: src/KnowledgeHub.Web/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-data:
  api-uploads:
