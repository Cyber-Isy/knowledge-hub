services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5001:8080"
      - "5000:8080"
    volumes:
      - ./src/KnowledgeHub.API/appsettings.Development.json:/app/appsettings.Development.json:ro

  web:
    ports:
      - "4200:80"
      - "4201:80"
