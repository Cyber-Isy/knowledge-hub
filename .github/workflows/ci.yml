name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Restore dependencies
        run: dotnet restore KnowledgeHub.slnx
      - name: Build
        run: dotnet build KnowledgeHub.slnx --no-restore -c Release
      - name: Test
        run: dotnet test KnowledgeHub.slnx --no-build -c Release --verbosity normal

  frontend:
    name: Build & Lint (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/KnowledgeHub.Web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/KnowledgeHub.Web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx ng lint
      - name: Build
        run: npx ng build --configuration=production
